services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: petdb
      POSTGRES_USER: petuser
      POSTGRES_PASSWORD: petpass
    volumes:
      - postgres_data:/var/lib/postgresql/data/
  web:
    build: .
    command: gunicorn pet.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: petdb
      POSTGRES_USER: petuser
      POSTGRES_PASSWORD: petpass
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      - db
volumes:
  postgres_data:  
      